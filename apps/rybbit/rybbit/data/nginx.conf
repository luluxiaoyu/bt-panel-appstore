server {
    listen 80;
    listen 443 ssl;
    server_name _; # 或者填入您的 ${DOMAIN_NAME}

    # 自签名证书路径 (稍后在 Docker 中挂载)
    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    # 压缩配置 (对应 Caddy 的 encode)
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # 对应 Caddy 的 request_body max_size 10MB
    client_max_body_size 10M;

    # 反向代理通用 Header 设置
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # 处理 /api/* 请求
    location /api/ {
        proxy_pass http://rybbit-backend:3001;
    }

    # 处理其他所有请求 (对应 Caddy 的 handle)
    location / {
        proxy_pass http://rybbit-client:3002;
    }
}