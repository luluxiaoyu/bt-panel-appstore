services:
  rybbit-nginx:
    image: nginx:stable-alpine
    restart: always
    ports:
      - "${HOST_IP}:${RYBBIT_CADDY_HTTP_PORT}:80"
      - "${HOST_IP}:${RYBBIT_CADDY_HTTPS_PORT}:443"
    volumes:
      # 挂载 Nginx 配置文件
      - ${APP_PATH}/data/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # 挂载证书目录 (存放 server.crt 和 server.key)
      - ${APP_PATH}/data/cert:/etc/nginx/certs:ro
    depends_on:
      - rybbit-backend
      - rybbit-client
    labels:
      createdBy: "bt_apps"
    networks:
      - baota_net
    deploy:
      resources:
        limits:
          cpus: "${CPUS}"
          memory: "${MEMORY_LIMIT}"

  rybbit-clickhouse:
    image: clickhouse/clickhouse-server:25.4.2
    volumes:
      - ${APP_PATH}/data/clickhouse/data:/var/lib/clickhouse
    configs:
      - source: rybbit_clickhouse_network
        target: /etc/clickhouse-server/config.d/network.xml
      - source: rybbit_clickhouse_json
        target: /etc/clickhouse-server/config.d/enable_json.xml
      - source: rybbit_clickhouse_logging
        target: /etc/clickhouse-server/config.d/logging_rules.xml
      - source: rybbit_clickhouse_user_logging
        target: /etc/clickhouse-server/config.d/user_logging.xml
    environment:
      - CLICKHOUSE_DB=${CLICKHOUSE_DB}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 3s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: always
#    ports:
#      - "${HOST_IP}:${RYBBIT_CLICKHOUSE_PORT}:8123"
    labels:
      createdBy: "bt_apps"
    networks:
      - baota_net
    deploy:
      resources:
        limits:
          cpus: "${CPUS}"
          memory: "${MEMORY_LIMIT}"

  rybbit-postgres:
    image: postgres:17.4
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ${APP_PATH}/data/postgres/data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 3s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: always
#    ports:
#      - "${HOST_IP}:${RYBBIT_POSTGRES_PORT}:5432"
    labels:
      createdBy: "bt_apps"
    networks:
      - baota_net
    deploy:
      resources:
        limits:
          cpus: "${CPUS}"
          memory: "${MEMORY_LIMIT}"

  rybbit-backend:
    image: ghcr.io/rybbit-io/rybbit-backend:${VERSION}
#    ports:
#      - "${HOST_IP}:${RYBBIT_API_PORT}:3001"
    environment:
      - NODE_ENV=production
      - CLICKHOUSE_HOST=http://rybbit-clickhouse:8123
      - CLICKHOUSE_DB=${CLICKHOUSE_DB}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      - POSTGRES_HOST=rybbit-postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BASE_URL=${BASE_URL}
      - DISABLE_SIGNUP=${DISABLE_SIGNUP}
      - DISABLE_TELEMETRY=${DISABLE_TELEMETRY}
      - MAPBOX_TOKEN=${MAPBOX_TOKEN}
    depends_on:
      rybbit-clickhouse:
        condition: service_healthy
      rybbit-postgres:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3001/api/health"]
      interval: 3s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: always
    labels:
      createdBy: "bt_apps"
    networks:
      - baota_net
    deploy:
      resources:
        limits:
          cpus: "${CPUS}"
          memory: "${MEMORY_LIMIT}"

  rybbit-client:
    image: ghcr.io/rybbit-io/rybbit-client:${VERSION}
#    ports:
#      - "${HOST_IP}:${RYBBIT_WEB_PORT}:3002"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_BACKEND_URL=${BASE_URL}
      - NEXT_PUBLIC_DISABLE_SIGNUP=${DISABLE_SIGNUP}
    depends_on:
      - rybbit-backend
    restart: always
    labels:
      createdBy: "bt_apps"
    networks:
      - baota_net
    deploy:
      resources:
        limits:
          cpus: "${CPUS}"
          memory: "${MEMORY_LIMIT}"

networks:
  baota_net:
    external: true

configs:
  rybbit_clickhouse_network:
    content: |
      <clickhouse>
          <listen_host>0.0.0.0</listen_host>
      </clickhouse>
  rybbit_clickhouse_json:
    content: |
      <clickhouse>
          <settings>
              <enable_json_type>1</enable_json_type>
          </settings>
      </clickhouse>
  rybbit_clickhouse_logging:
    content: |
      <clickhouse>
        <logger>
            <level>warning</level>
            <console>true</console>
        </logger>
        <query_thread_log remove="remove"/>
        <query_log remove="remove"/>
        <text_log remove="remove"/>
        <trace_log remove="remove"/>
        <metric_log remove="remove"/>
        <asynchronous_metric_log remove="remove"/>
        <session_log remove="remove"/>
        <part_log remove="remove"/>
        <latency_log remove="remove"/>
        <processors_profile_log remove="remove"/>
      </clickhouse>
  rybbit_clickhouse_user_logging:
    content: |
      <clickhouse>
        <profiles>
          <default>
            <log_queries>0</log_queries>
            <log_query_threads>0</log_query_threads>
            <log_processors_profiles>0</log_processors_profiles>
          </default>
        </profiles>
      </clickhouse>
