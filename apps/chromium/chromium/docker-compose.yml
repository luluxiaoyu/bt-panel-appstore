services:
  chromium:
    image: linuxserver/chromium:latest
    environment:
      - TZ=Etc/UTC
      - LC_ALL=zh_CN.UTF-8
      - PASSWORD=${PASSWORD}
      - CUSTOM_USER=${USERNAME}
    ports:
      - "${HOST_IP}:${CHROMIUM_HTTPS_PORT}:3001"
    volumes:
      - ${APP_PATH}/data:/config
    shm_size: "1gb"
    deploy:
      restart_policy:
        condition: always
      resources:
        limits:
          cpus: "${CPUS}"
          memory: "${MEMORY_LIMIT}"
    labels:
      createdBy: "bt_apps"
    networks:
      - baota_net

networks:
  baota_net:
    external: true