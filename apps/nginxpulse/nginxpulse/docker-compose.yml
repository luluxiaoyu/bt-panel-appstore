services:
  nginxpulse:
    image: magiccoders/nginxpulse:${VERSION}
    deploy:
      resources:
        limits:
          cpus: "${CPUS}"
          memory: "${MEMORY_LIMIT}"
    restart: always
    ports:
      - ${HOST_IP}:${WEB_HTTP_PORT}:8088
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - DB_DSN=${DB_DSN}
    volumes:
      - ${LOG_PATH}:/share/logs:ro
      - ${APP_PATH}/nginxpulse_data:/app/var/nginxpulse_data
      - ${APP_PATH}/pgdata:/app/var/pgdata
      - ${APP_PATH}/configs:/app/configs
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    stop_grace_period: 90s
    labels:
      createdBy: "bt_apps"
    networks:
      - baota_net

networks:
  baota_net:
    external: true
