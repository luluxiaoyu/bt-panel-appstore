services:
  pushdeer-mariadb:
    image: 'mariadb:10.5.8-focal'
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "--silent", "--password=$DB_ROOT_PASSWORD"]
      timeout: 10s
      retries: 3
    volumes:
      - ${APP_PATH}/data/mariadb_data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_DATABASE}
    # ports:
    #   - "${HOST_IP}:${PUSHDEER_DB_PORT}:3306"
    deploy:
      resources:
        limits:
          cpus: "${CPUS}"
          memory: "${MEMORY_LIMIT}"
    labels:
      createdBy: "bt_apps"
    networks:
      - baota_net

  pushdeer-redis:
    image: 'bitnami/redis:6.0.16'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
    deploy:
      resources:
        limits:
          cpus: "${CPUS}"
          memory: "${MEMORY_LIMIT}"
    labels:
      createdBy: "bt_apps"
    networks:
      - baota_net

  pushdeer-app:
    image: wbsu2003/pushdeer:latest
    ports:
      - "${HOST_IP}:${PUSHDEER_WEB_PORT}:80"
    volumes:
      - ${APP_PATH}/data/app:/app
    depends_on:
      pushdeer-mariadb:
        condition: service_healthy
      pushdeer-redis:
        condition: service_healthy
    links:
      - pushdeer-redis:redis
    environment:
      - DB_HOST=pushdeer-mariadb
      - DB_PORT=3306
      - DB_USERNAME=${DB_USERNAME}
      - DB_DATABASE=${DB_DATABASE}
      - DB_PASSWORD=${DB_ROOT_PASSWORD}
      - GO_PUSH_IOS_TOPIC=com.pushdeer.self.ios
    deploy:
      resources:
        limits:
          cpus: "${CPUS}"
          memory: "${MEMORY_LIMIT}"
    labels:
      createdBy: "bt_apps"
    networks:
      - baota_net

networks:
  baota_net:
    external: true