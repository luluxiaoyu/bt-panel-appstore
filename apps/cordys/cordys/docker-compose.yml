services:
  cordys-crm:
    image: 1panel/cordys-crm
    ports:
      - "${HOST_IP}:${CORDYS_WEB_PORT}:8081"
      - "${HOST_IP}:${CORDYS_ADMIN_PORT}:8082"
    volumes:
      - ${APP_PATH}/data/cordys:/opt/cordys
    deploy:
      restart_policy:
        condition: unless-stopped
      resources:
        limits:
          cpus: "${CPUS}"
          memory: "${MEMORY_LIMIT}"
    labels:
      createdBy: "bt_apps"
    networks:
      - baota_net

networks:
  baota_net:
    external: true