services:
  ds-postgres:
    image: pgvector/pgvector:pg13
    # restart: unless-stopped
    environment:
      POSTGRES_USER: discourse
      POSTGRES_PASSWORD: db_password
      POSTGRES_DB: discourse
    volumes:
      - ${APP_PATH}/data/pgdata:/var/lib/postgresql/data
    labels:
      createdBy: "bt_apps"
    networks:
      - baota_net

  ds-redis:
    image: redis:7
    # restart: unless-stopped
    command: [ "redis-server", "--appendonly", "yes" ]
    volumes:
      - ${APP_PATH}/data/redisdata:/data
    labels:
      createdBy: "bt_apps"
    networks:
      - baota_net

  discourse:
    image: discourse/discourse:${VERSION}
    depends_on:
      - ds-postgres
      - ds-redis
    ports:
      - ${HOST_IP}:${DISCOURSE_WEB_PORT}:80
    # restart: unless-stopped
    environment:
      DISCOURSE_HOSTNAME: ${DISCOURSE_HOST} # use a real domain in practice
      DISCOURSE_DB_HOST: ds-postgres
      DISCOURSE_DB_NAME: discourse
      DISCOURSE_DB_USERNAME: discourse
      DISCOURSE_DB_PASSWORD: db_password
      DISCOURSE_REDIS_HOST: ds-redis
      DISCOURSE_SMTP_ADDRESS: ${DISCOURSE_SMTP_ADDRESS}
      DISCOURSE_SMTP_PORT: ${DISCOURSE_SMTP_PORT}
      DISCOURSE_SMTP_USER_NAME: ${DISCOURSE_SMTP_USER_NAME}
      DISCOURSE_SMTP_PASSWORD: ${DISCOURSE_SMTP_PASSWORD}
      DISCOURSE_SMTP_ENABLE_START_TLS: true
      DISCOURSE_SMTP_OPENSSL_VERIFY_MODE: none
      # Optional: initial admin
      DISCOURSE_DEVELOPER_EMAILS: ${DISCOURSE_DEVELOPER_EMAILS}
      DISCOURSE_NOTIFICATION_EMAIL: ${DISCOURSE_SMTP_USER_NAME}
    volumes:
      - ${APP_PATH}/data/uploads:/var/www/discourse/public/uploads
      - ${APP_PATH}/data/backups:/var/www/discourse/public/backups
      - ${APP_PATH}/data/nginx-o-bs-30-ratelimited.conf:/etc/nginx/conf.d/outlets/before-server/30-ratelimited.conf:ro
      - ${APP_PATH}/data/nginx-o-d-30-ratelimited.conf:/etc/nginx/conf.d/outlets/discourse/30-ratelimited.conf:ro
    labels:
      createdBy: "bt_apps"
    networks:
      - baota_net

networks:
  baota_net:
    external: true