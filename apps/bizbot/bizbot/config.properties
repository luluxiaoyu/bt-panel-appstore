#
# ========================= AI 通道配置说明 =========================
# 从当前版本开始，AI 配置固定拆成两层：
#
# 第一层：真实通道配置（只允许两套）
#   - openai.big.*     : 大尺寸模型通道。适合正常聊天、复杂生成、需要更强能力的任务。
#   - openai.medium.*  : 中等尺寸模型通道。适合网页分析、字段校验、审核评分等成本更敏感的任务。
#
# 第二层：业务通道路由（只填 big 或 medium）
#   - openai.chat
#   - openai.html
#   - openai.html.validate
#   - openai.html.danger
#   - openai.chat.audit
#
# 也就是说：
#   1. 接口地址、模型名、key、timeout、enableThinking、concurrency 只写在 openai.big.* / openai.medium.* 下
#   2. 业务通道只负责声明“这个场景走哪套真实通道”
#   3. 旧配置形态 openai.chat.url、openai.html.model、openai.chat.audit.key 等已经彻底废弃，不会再被程序读取
#
# 并发规则也随之变化：
#   - openai.big.concurrency     控制 big 通道自己的最大并发
#   - openai.medium.concurrency  控制 medium 通道自己的最大并发
#   - 两个通道互不抢占同一个并发池
#
# 如果路由值写错（不是 big / medium），程序启动时会记录告警并回退到默认值。
# 如果路由到了某个通道，但那个通道没有配置 key，对应功能调用时会失败，并在日志里明确提示。
# ================================================================

#
# openai.big：大尺寸模型通道
# 适用场景：
# 1. 正常聊天对话
# 2. AI 模拟聊天
# 3. 将复杂问题拆分为多个小问题
# 4. 其他更依赖模型能力上限的生成任务
#
# 请求地址，必须是兼容 OpenAI chat/completions 的接口
# 示例： https://api.openai.com/v1/chat/completions
openai.big.url=https://coding.dashscope.aliyuncs.com/v1/chat/completions
# 模型名称。填你的服务商实际模型名
openai.big.model=kimi-k2.5
# 接口请求超时时间，单位秒。建议给大模型留更宽松的时间
openai.big.timeout=500
# API Key / Token。未配置时，路由到 big 的功能会直接失败
#openai.big.key=
# 是否启用推理模式。false 更快，true 更充分但更慢
openai.big.enableThinking=false
# big 通道自己的最大并发数。
# 这里只限制“路由到 big 的请求”本身，不影响 medium 通道。
# 不设置默认是 1；如果机器和模型服务承受得住，可以逐步调大。
openai.big.concurrency=5

#
# openai.medium：中等尺寸模型通道
# 适用场景：
# 1. 网页内容分析与信息提取
# 2. 字段校验 / 重试抽取
# 3. 内容审核、评分、适配性判断
# 4. 其他成本优先、速度优先的任务
#
# 请求地址。通常这里可以配成本更低、吞吐更高的服务
openai.medium.url=http://api.moark.com/v1/chat/completions
# 模型名称
openai.medium.model=Qwen3.5-35B-A3B
# 接口请求超时时间，单位秒
openai.medium.timeout=500
# API Key / Token
#openai.medium.key=
# 是否启用推理模式
openai.medium.enableThinking=false
# medium 通道自己的最大并发数。
# 如果 medium 模型吞吐更高，这里通常可以配置得比 big 大。
# 不设置默认是 1。
openai.medium.concurrency=1

#
# ========================= 业务通道路由 =========================
# 下面这些配置只允许填写 big 或 medium。
# 它们不再携带 url/model/key/timeout，而只是声明“这个业务场景走哪套真实通道”。
# ================================================================

#
# openai.chat：聊天主通道
# 用于：
# 1. 正常聊天
# 2. AI 模拟聊天
# 3. 将用户问题拆解为多个单一问题
#
# 当前设为 big，表示聊天相关请求统一走 openai.big.*
openai.chat=big

#
# openai.chat.audit：聊天审核 / 评分通道
# 用于问候语、标题、客户意向等评分判断类任务
# 当前设为 medium，表示审核类请求统一走 openai.medium.*
openai.chat.audit=medium

#
# openai.html：网页分析通道
# 它会把网页内容（通常已转成 markdown 文本）送给 AI 做结构化提取。
# 典型用途：
# 1. 提取卖家基本信息，如公司名、行业、简介
# 2. 提取知识库问答，沉淀到 sellersetup 的 MySQL 知识库
#
# 按你的要求，这里固定先走 medium
openai.html=medium

#
# openai.html.validate：字段校验通道
# 当 HtmlAI 提取的联系人字段需要二次核验、纠错或重试时使用
# 当前设为 medium，表示校验请求也走 openai.medium.*
openai.html.validate=medium

#
# openai.html.danger：网站商业推广适配性审核通道
# 用于判断某网站是否适合做商业推广宣传
# 当前设为 medium
openai.html.danger=medium
# 这个通道额外支持一个总 token 预算限制（输入+输出），用于防止页面内容过长把上下文撑爆
# 默认 16000，允许范围 2000-50000
openai.html.danger.maxTokens=16000


#
# embedding 是用于文本向量化的通道
# 将文本转换为向量，用于知识库的语义搜索、去重等
# 需要部署 Ollama 并拉取 bge-m3 模型：ollama pull bge-m3
#
# 请求url（Ollama 兼容 OpenAI 的 /v1/embeddings 接口）
embedding.url=https://api.moark.com/v1/embeddings
# 模型名称
embedding.model=bge-m3
#embedding.key=

#
# 管理台界面语言，值遵循 translate.js 的语种标识
# 可选值：
# chinese_simplified  简体中文
# chinese_traditional 繁体中文
# english             英文
#
# 注意：首次使用简单版时，系统会引导用户选择语言并自动保存到此配置项。
# 如果此配置项被注释或值为空，访问简单版首页时会跳转到语言引导页。
#language=chinese_simplified

#
# 第三方翻译服务配置
# 用于在真正入队发送前做语种兜底翻译
# domain 填服务根域名，程序会自动拼接 /translate.json
# 例如：https://giteeai.zvo.cn
translate.service.domain=https://giteeai.zvo.cn
translate.service.key=abc

#
# 数据库配置
# 使用 MySQL 数据库
#
# 数据库名
database.name=bizexplore
# 数据库所在ip地址
database.ip=mysql
# 数据库连接的登陆账号
database.username=bizexplore
# 数据库连接的登陆密码
database.password=55SpfeTzFKfy6aXa

# 全网检索配置
# 静态文件基础路径（用于存储抓取结果等）
websearch.static.basePath=/home/git/kefu.js
# 最大线程数
websearch.maxThreadNumber=30
# 搜索引擎选择：baidu（百度，仅中文）/ bing（必应，全球搜索）/ so360（360搜索，国内）
# 默认不设置则使用百度
websearch.source=baidu
# 搜索页数（默认10，范围1-100，百度、bing、360共用）
# 搜索间隔秒数（默认10秒，范围3-60秒，百度、bing、360共用，避免触发验证码）
websearch.sleep=60
# websearch 页面抓取模式（默认不配置时自动使用 auto）
# 这个配置当前影响的是 websearch 这条联系人抓取链路。
# 注意：它不是 sellersetup 的整站 UrlSpider 抓取开关，UrlSpider 本身已经使用 Chrome 获取页面源码。
#
# 可选值：
# auto
#   默认推荐模式。先走轻量抓取；如果联系人提取时发现当前页面疑似动态壳页、正文过少、结果明显不足，
#   再自动补一次 Chrome 渲染后的 HTML 重试。这个模式兼顾速度、稳定性和漏抓控制。
#
# chrome_only
#   所有 websearch 页面统一直接走 Chrome 渲染后的 HTML，再进入联系人分析。
#   适合你明确知道目标站大量依赖前端渲染，且当前整体瓶颈主要在大模型分析而不是页面抓取时使用。
#
# light_only
#   所有 websearch 页面都只走轻量抓取，完全不启用 Chrome 渲染兜底。
#   适合调试纯静态抓取链路，或当前运行环境不方便启用 Chrome 时使用。
#
# 默认建议：
# 不配置即可，系统会自动按 auto 处理。
#websearch.pageFetchMode=auto

#
# 任务状态恢复配置
# pending 状态超时时间（秒），超过此时间视为异常状态，启动时自动恢复
# 默认 600 秒（10分钟），服务正常重启时不会误恢复正在等待确认的记录
#
task.recover.pendingTimeout=600

# 首封开发邮件正文目标 tokens 数（按区间校验，不是要求严格等于该值）
# 合格区间计算： [目标值*0.85, 目标值*1.15]
# 例如设置为 300，则合格区间为 255~345 tokens（含边界）
# 规则说明：这个区间只用于首封开发邮件正文；客户回复后的继续沟通不套这个固定长度约束
chat.email.content.size=300
# 聊天邮件标题目标 tokens 数（同样按 ±15% 区间校验）
chat.email.title.size=20
# 聊天内容审核通过分数阈值（问候语和邮件标题共用，0-100分）
chat.audit.scoringthreshold=90
# 客户来信后的自动回复，若 AI 评分低于此值，则强制进入人工审核后才能发送（0-100分）
chat.reply.lowScoreManualReviewThreshold=85
# 聊天消息发送前是否需要管理人员人工审核（chat.review）
# 可选值：
# 1 : 需要人工审核。AI 生成的对外聊天消息会先进入待确认，只有管理者审核通过后才会真正发送给客户
# 0 : 不需要人工审核。AI 生成完成后会直接进入发送队列，无需管理者确认，可直接发送给客户
# 作用范围：
# - 首次打招呼消息
# - 客户来信后的自动回复消息
# - 其他后续扩展的对外聊天发送动作
# 特别说明：
# - 当 run.mode=test 时，此配置无效，系统会强制按 chat.review=1 处理
# - 这样测试模式下每条待发消息都会先展示给管理者审核，更符合测试模式的测试标准
chat.review=0

# 聊天任务并发线程数（同时处理几个客户），默认 1
chat.threadNumber=1

# 运行模式（run.mode）
# 可选值：
# normal : 正常模式（默认）。按 chat.threadNumber 并发处理待联系记录
# test   : 测试模式。适合刚开始使用、先模拟跑通流程再正式运行
# 测试模式行为：
# 1) 任务强制单线程，只处理第一条符合要求的 info 记录后自动停止
# 2) 邮件收件人会强制替换为 admin.email，不会发给真实客户邮箱
# 3) 无论 chat.review 配置写的是 0 还是 1，所有对外聊天消息在真正发出前都会进入“待确认”
#    只有管理者人工审核通过后才会发送，更方便在测试模式下检查 AI 实际要发出的内容
#    - 包含：聊天任务首次打招呼邮件
#    - 包含：收信后 AI 自动生成的回复邮件
# 说明：未识别值会自动回退为 normal
#run.mode=test

# 管理员邮箱（admin.email）
# 系统使用者/管理者自己的邮箱地址
# 当 run.mode=test 时必填；测试发送会将收件人替换成该邮箱
# 建议填写你能立即收到邮件的地址，用于快速验证聊天任务效果
# 注意：该配置仅用于“主动打招呼”的测试收件替换；自动回复场景会按真实来信地址回复，
#       但在 test 模式下同样会先进入待确认，需人工确认后才会发送
#admin.email=

# HTTP 请求并发线程数（用于 SetupWebServer 和 KnowledgeManagementServer）
http.request.concurrency=20

#
# 发件人名称配置
# 设置后，邮件发送时显示的发件人名字（如 "张三" 显示为 "张三 <xxx@163.com>"）
# 默认不配置，则使用邮箱地址本身，不设置发件人名字
#
#my.name=张三

#
# 钉钉机器人通知配置
# 用于系统异常、重要事件等主动通知管理者
#
# Webhook 的 access_token
#notice.dingtalk.accesstoken=
# 安全设置的加签密钥
#notice.dingtalk.key=

#
# 文件存储配置
# 用于存储邮件附件和大型邮件正文
#
# 存储路径（相对于项目根目录）
fileupload.path=fileupload/
# 访问域名（本地存储时可为空）
fileupload.domain=
# 邮件内容存储阈值（字节），超过此值存入文件系统，默认 50KB
chat.content.threshold=51200

#
# 许可证配置（用户需自行放置许可证文件）
#
#license.file=license/license.lic
#license.publicKey=

# BizBot 网关统一登录密钥（未配置时自动生成）
#bizbot.key=

# 知识库开放 API 开关（POST /knowledge/ask，经网关对外暴露）
knowledge.openapi.enabled=true
