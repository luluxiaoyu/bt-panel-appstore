services:
  mysql:
    image: xnx3/bizbot-mysql-auto:8.0
#    container_name: bizbot-mysql
    networks:
      - bizbot-network
#    ports:
#      - "${MYSQL_PORT:-3306}:3306"
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ${APP_PATH}/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "bizexplore", "-p55SpfeTzFKfy6aXa"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    labels:
      createdBy: "bt_apps"

  bizbot:
    image: xnx3/bizbot:latest
#    container_name: bizbot
    networks:
      - bizbot-network
    ports:
      - "${GATEWAY_PORT:-8085}:8085"
      - "${MAIN_PORT:-8089}:8089"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - DISPLAY=:99
      - JAVA_OPTS=-Xms512m -Xmx${JVM_MEMORY}m -XX:+UseG1GC
      - TZ=Asia/Shanghai
    volumes:
      - /etc/machine-id:/etc/machine-id
      - /var/lib/dbus/machine-id:/var/lib/dbus/machine-id
      - ${APP_PATH}/license:/mnt/bizbot/license
      - ${APP_PATH}/config:/mnt/bizbot/config
      - ${APP_PATH}/logs:/mnt/bizbot/logs
      - ${APP_PATH}/config.properties:/opt/bizexplore/config.properties
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8089/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    labels:
      createdBy: "bt_apps"

networks:
  bizbot-network:
    driver: bridge