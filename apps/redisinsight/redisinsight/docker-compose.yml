services:
  redisinsight:
    image: redis/redisinsight:latest
    ports:
      - "${HOST_IP}:${REDISINSIGHT_WEB_PORT}:5540"
    volumes:
      - ${APP_PATH}/data/db:/data
    deploy:
      restart_policy:
        condition: always
      resources:
        limits:
          cpus: "${CPUS}"
          memory: "${MEMORY_LIMIT}"
    labels:
      createdBy: "bt_apps"
    networks:
      - baota_net

networks:
  baota_net:
    external: true